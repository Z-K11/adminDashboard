<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="main-container">
        <div class="side-bar">
            <div class="side-bar-logo"></div>
            <div class="side-bar-options"></div>
            <div class="side-bar-settings"></div>
        </div>
        <div class="main-section">
            <div class="nav-bar"></div>
            <div class="nav-header">
                <div class="header-left">
                    <div class="header-icon"></div>
                    <div class="quote"></div>
                    <div class="alias"></div>
                </div>
                <div class="header-right">
                    <button class="header-button-1"></button>
                    <button class="header-button-2"></button>
                    <button class="header-button-3"></button>
                </div>
            </div>
            <div class="content-box">
                <div class="project-1">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-2">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-3">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-4">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-5">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-6">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
            </div>
            <div class="highlights-box">
                <div class="acheivements">
                    <div class="achievement-list-item-1"></div>
                    <div class="achievement-list-item-2"></div>
                    <div class="achievement-list-item-3"></div>
                </div>
                <div class="trending">
                    <div class="trend-icon-bar">
                        <div class="trend-icon"></div>
                        <div class="trend-icon"></div>
                        <div class="trend-icon"></div>
                        <div class="trend-icon"></div>
                    </div>
                    <div class="trend-content-bar">
                        <div class="trend-content-1"></div>
                        <div class="trend-content-2"></div>
                        <div class="trend-content-3"></div>
                        <div class="trend-content-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
