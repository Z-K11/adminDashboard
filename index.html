<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Dashboard</title>

                    <div class="svg-div">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M13.5,8H12V13L16.28,15.54L17,14.33L13.5,12.25V8M13,3A9,9 0 0,0 4,12H1L4.96,16.03L9,12H6A7,7 0 0,1 13,5A7,7 0 0,1 20,12A7,7 0 0,1 13,19C11.07,19 9.32,18.21 8.06,16.94L6.64,18.36C8.27,20 10.5,21 13,21A9,9 0 0,0 22,12A9,9 0 0,0 13,3" />

                </div>
            </div>
            <div class="side-bar-settings">Placeholder settings</div>
        </div>
        <div class="main-section">
            <div class="nav-bar"></div>
            <div class="nav-header">
                <div class="header-left">
                    <div class="header-icon"></div>
                    <div class="quote"></div>
                    <div class="alias"></div>
                </div>
                <div class="header-right">
                    <button class="header-button-1"></button>
                    <button class="header-button-2"></button>
                    <button class="header-button-3"></button>
                </div>
            </div>
            <div class="content-box">
                <div class="project-1">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-2">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-3">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-4">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-5">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
                <div class="project-6">
                    <div class="content"></div>
                    <div class="project-icons"></div>
                </div>
            </div>
            <div class="highlights-box">
                <div class="acheivements">
                    <div class="achievement-list-item-1"></div>
                    <div class="achievement-list-item-2"></div>
                    <div class="achievement-list-item-3"></div>
                </div>
                <div class="trending">
                    <div class="trend-icon-bar">
                        <div class="trend-icon"></div>
                        <div class="trend-icon"></div>
                        <div class="trend-icon"></div>
                        <div class="trend-icon"></div>
                    </div>
                    <div class="trend-content-bar">
                        <div class="trend-content-1"></div>
                        <div class="trend-content-2"></div>
                        <div class="trend-content-3"></div>
                        <div class="trend-content-4"></div>
                    </div>
                </div>
            </div>
        </div>
